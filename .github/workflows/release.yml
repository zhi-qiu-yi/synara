name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: true
        type: string
      publish_release:
        description: "Publish the GitHub/npm release after successful builds"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: synara-desktop-release
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      mirror_to_stable_channel: ${{ steps.release_meta.outputs.mirror_to_stable_channel }}
      publish_release: ${{ steps.release_mode.outputs.publish_release }}
      release_lane: ${{ steps.release_meta.outputs.release_lane }}
      bridge_tag: ${{ steps.release_meta.outputs.bridge_tag }}
      update_channel: ${{ steps.release_meta.outputs.update_channel }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - id: release_mode
        name: Resolve publication mode
        shell: bash
        env:
          PUBLISH_RELEASE: ${{ github.event_name == 'push' || inputs.publish_release }}
        run: |
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          if [[ "$PUBLISH_RELEASE" == "true" ]]; then
            echo "Publication enabled."
          else
            echo "Build-only validation enabled; no release or package will be published."
          fi

      - id: release_meta
        name: Resolve release policy
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
        run: node scripts/resolve-release-update-policy.ts "$RELEASE_VERSION"

      - name: Verify public updater repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          visibility="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .visibility)"
          if [[ "$visibility" != "public" ]]; then
            echo "The dedicated updater channel requires the public GitHub provider; repository visibility is $visibility." >&2
            exit 1
          fi

      - name: Verify pinned compatibility feed
        if: ${{ steps.release_meta.outputs.release_lane == 'clean' && steps.release_mode.outputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ steps.release_meta.outputs.bridge_tag }}
          UPDATE_CHANNEL: ${{ steps.release_meta.outputs.update_channel }}
        run: |
          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

          bridge_release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${BRIDGE_TAG}" --jq .id)"
          bridge_assets="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${bridge_release_id}/assets?per_page=100" \
              --jq '.[].name'
          )"
          required_assets=(
            latest-mac.yml
            latest.yml
            latest-linux.yml
            "${UPDATE_CHANNEL}-mac.yml"
            "${UPDATE_CHANNEL}.yml"
            "${UPDATE_CHANNEL}-linux.yml"
          )
          for required_asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$required_asset" <<< "$bridge_assets"; then
              echo "Pinned compatibility feed is missing $required_asset." >&2
              exit 1
            fi
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Synara identity
        run: bun run brand:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            target: nsis
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        # Preflight already runs the full lifecycle-script install plus lint,
        # typecheck, and tests. Artifact jobs only need dependencies available.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS signing enabled."
              args+=(--signed)
            else
              echo "macOS signing disabled (missing one or more Apple signing secrets)."
            fi
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            # Windows signing is optional. Keep producing the NSIS installer when
            # Azure signing is unavailable, matching Synara's existing releases.
            if has_all \
              "$AZURE_TENANT_ID" \
              "$AZURE_CLIENT_ID" \
              "$AZURE_CLIENT_SECRET" \
              "$AZURE_TRUSTED_SIGNING_ENDPOINT" \
              "$AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" \
              "$AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" \
              "$AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"; then
              echo "Windows signing enabled (Azure Trusted Signing)."
              args+=(--signed)
            else
              echo "Windows signing is optional; building an unsigned installer because one or more Azure Trusted Signing secrets are missing."
            fi
          else
            echo "Signing disabled for ${{ matrix.platform }}."
          fi

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" == "x64" ]]; then
            # electron-builder occasionally times out fetching x64 DMG helper bundles on GitHub-hosted macOS runners.
            # Retry this narrow packaging path so transient upstream 504s do not block the whole release.
            max_attempts=3
            for attempt in $(seq 1 "$max_attempts"); do
              if bun run dist:desktop:artifact -- "${args[@]}"; then
                break
              fi

              if [[ "$attempt" -eq "$max_attempts" ]]; then
                echo "macOS x64 desktop artifact build failed after $max_attempts attempts."
                exit 1
              fi

              sleep_seconds=$((attempt * 15))
              echo "macOS x64 desktop artifact build failed on attempt $attempt/$max_attempts. Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done
          else
            bun run dist:desktop:artifact -- "${args[@]}"
          fi

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish_cli:
    name: Publish CLI to npm
    if: ${{ needs.preflight.outputs.publish_release == 'true' && vars.SYNARA_PUBLISH_CLI == '1' }}
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        # Preflight already validates lifecycle scripts; the publish job only
        # needs dependencies available to build the package.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build CLI package
        run: bun run build --filter=@synara/web --filter=@synara/cli

      - name: Publish CLI package
        run: node apps/server/scripts/cli.ts publish --tag latest --app-version "${{ needs.preflight.outputs.version }}" --verbose

  release:
    name: Publish GitHub Release
    if: ${{ needs.preflight.outputs.publish_release == 'true' }}
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          node scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Prepare updater feed metadata
        run: node scripts/prepare-release-update-feed.ts release-assets

      - name: Prevent compatibility channel rollback
        if: ${{ needs.preflight.outputs.release_lane == 'bridge' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
          BRIDGE_VERSION: ${{ needs.preflight.outputs.version }}
          UPDATE_CHANNEL: ${{ needs.preflight.outputs.update_channel }}
        run: |
          set -euo pipefail

          if ! bridge_release_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${BRIDGE_TAG}" 2>&1
          )"; then
            if grep -q "HTTP 404" <<< "$bridge_release_json"; then
              exit 0
            fi
            echo "$bridge_release_json" >&2
            exit 1
          fi
          bridge_release_id="$(jq -r .id <<< "$bridge_release_json")"

          bridge_assets="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${bridge_release_id}/assets?per_page=100" \
              --jq '.[].name'
          )"
          channel_manifests=(
            "${UPDATE_CHANNEL}-mac.yml"
            "${UPDATE_CHANNEL}.yml"
            "${UPDATE_CHANNEL}-linux.yml"
          )
          existing_manifests=()
          for manifest in "${channel_manifests[@]}"; do
            if grep -Fxq "$manifest" <<< "$bridge_assets"; then
              existing_manifests+=("$manifest")
            fi
          done

          if [[ "${#existing_manifests[@]}" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${#existing_manifests[@]}" -ne "${#channel_manifests[@]}" ]]; then
            echo "Compatibility feed has a partial dedicated-channel manifest set: ${existing_manifests[*]}." >&2
            exit 1
          fi

          manifest_directory="$(mktemp -d)"
          trap 'rm -rf "$manifest_directory"' EXIT
          for manifest in "${channel_manifests[@]}"; do
            gh release download "$BRIDGE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$manifest" \
              --dir "$manifest_directory"
            manifest_version="$(
              sed -n 's/^version:[[:space:]]*//p' "$manifest_directory/$manifest" \
                | head -n 1 \
                | tr -d "[:space:]'\""
            )"
            if [[ "$manifest_version" != "$BRIDGE_VERSION" ]]; then
              echo "Refusing to replace $manifest version ${manifest_version:-unknown} with compatibility version $BRIDGE_VERSION." >&2
              exit 1
            fi
          done

      - name: Recheck pinned compatibility feed
        if: ${{ needs.preflight.outputs.release_lane == 'clean' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
        run: |
          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Synara v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true

      - name: Mirror Synara artifacts onto the pinned updater feed
        if: ${{ needs.preflight.outputs.mirror_to_stable_channel == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
          UPDATE_CHANNEL: ${{ needs.preflight.outputs.update_channel }}
        run: |
          set -euo pipefail

          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

          shopt -s nullglob
          payloads=(
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
          )
          manifests=(
            "release-assets/${UPDATE_CHANNEL}-mac.yml"
            "release-assets/${UPDATE_CHANNEL}.yml"
            "release-assets/${UPDATE_CHANNEL}-linux.yml"
          )

          if [[ "${#payloads[@]}" -eq 0 ]]; then
            echo "No desktop payloads found for the pinned updater feed." >&2
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            if [[ ! -f "$manifest" ]]; then
              echo "Missing updater manifest: $manifest" >&2
              exit 1
            fi
          done

          # Payloads must exist before a manifest is visible, otherwise an
          # updater can observe a version whose installer is not uploaded yet.
          gh release upload "$BRIDGE_TAG" "${payloads[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          gh release upload "$BRIDGE_TAG" "${manifests[@]}" --clobber --repo "$GITHUB_REPOSITORY"

          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Pinned updater feed moved during publication: $actual_latest." >&2
            exit 1
          fi

  finalize:
    name: Finalize release
    if: ${{ needs.preflight.outputs.publish_release == 'true' && vars.SYNARA_FINALIZE_RELEASE == '1' }}
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - id: app_token
        name: Mint release app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: bunx oxfmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "${{ steps.app_bot.outputs.name }}"
          git config user.email "${{ steps.app_bot.outputs.email }}"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
